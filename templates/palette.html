<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f2e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="__APP_NAME__" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="__BASE_PATH__icons/__PALETTE_SLUG__-apple-touch-icon.png" />
  <link rel="icon" href="__BASE_PATH__icons/__PALETTE_SLUG__-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="__BASE_PATH__styles.css" />
  <title>__APP_NAME__</title>
</head>
<body class="palette-page">
  <div id="splashScreen" class="splash-screen" aria-hidden="true">
    <picture>
      <source media="(orientation: landscape)" srcset="__BASE_PATH__assets/splash-landscape.jpg" />
      <img src="__BASE_PATH__assets/splash-portrait.jpg" alt="" />
    </picture>
    <small class="splash-version">v__ESKYNA_APP_VERSION__</small>
  </div>

  <main class="app palette-app-layout">
    <header class="hero" aria-label="__APP_NAME__">
      <a class="hero-logo-link" href="https://eskyna.com" target="_blank" rel="noopener noreferrer" aria-label="ESKYNA Website öffnen">
        <img class="hero-logo" src="__BASE_PATH__assets/sign_gold.png" alt="ESKYNA Symbol" />
      </a>
      <div class="hero-copy">
        <h1 class="brand-title"><span class="brand-eskyna">ESKYNA</span> <span class="brand-farbe">Farbe</span><span id="customerName" class="customer-title hidden"></span></h1>
        <p id="pageTitle" class="palette-subtitle">__PALETTE_NAME__</p>
      </div>
    </header>

    <section class="palette-panel" aria-label="Farbkarte __PALETTE_NAME__">
      <div id="paletteGrid" class="palette-grid"></div>
    </section>

    <section class="analysis-panel" aria-label="Kleidungsstück prüfen">
      <p id="installHint" class="install-hint hidden" aria-live="polite"></p>
      <div id="scanSessionToolbar" class="scan-session-toolbar hidden" aria-live="polite">
        <span id="scanSessionTitle" class="scan-session-title">Dein Farbcheck</span>
        <button id="scanResultClose" class="scan-result-close" type="button" aria-controls="previewWrap result">Zur Farbkarte zurück</button>
      </div>
      <div id="previewWrap" class="preview-wrap hidden">
        <canvas id="previewCanvas"></canvas>
        <div class="target" aria-hidden="true"></div>
      </div>
      <div id="result" class="result hidden" aria-live="polite"></div>
    </section>

    <nav class="bottom-action-bar" aria-label="Aktionen">
      <button id="scanButton" class="bottom-action file-button bottom-file-button" type="button">
        <span class="camera-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <rect x="3" y="7" width="18" height="13" rx="2" ry="2"></rect>
            <path d="M8 7l1.4-2h5.2L16 7"></path>
            <circle cx="12" cy="13.5" r="3.5"></circle>
          </svg>
        </span>
        <span>Farbe prüfen</span>
      </button>
      <input id="photoInput" class="hidden-file-input" type="file" accept="image/*" capture="environment" tabindex="-1" aria-hidden="true" />
      <a class="bottom-action secondary-button telegram-button" href="__TELEGRAM_BOT_URL__" target="_blank" rel="noopener noreferrer">Stilfrage an Natalia</a>
      <button id="installButton" class="bottom-action install-button hidden" type="button">App installieren</button>
      <button id="updateButton" class="bottom-action install-button update-button hidden" type="button">App aktualisieren</button>
    </nav>
  </main>
  <section id="cameraScanner" class="camera-scanner hidden" aria-hidden="true" aria-label="Farbe live prüfen">
    <div class="scanner-stage">
      <video id="scannerVideo" autoplay muted playsinline></video>
      <canvas id="scannerCanvas" class="hidden" aria-hidden="true"></canvas>
      <div class="scanner-target" aria-hidden="true"></div>
      <div class="scanner-topline">
        <span id="scannerQuality" class="scanner-quality">Licht wird geprüft ...</span>
        <button id="scannerClose" class="scanner-close" type="button" aria-label="Scanner schließen">
          <span aria-hidden="true">×</span>
          <span id="scannerCloseLabel" class="scanner-close-label">Schließen</span>
        </button>
      </div>
      <p id="scannerHint" class="scanner-hint">Kleidungsstück glatt in den Kreis halten.</p>
      <div class="scanner-actions">
        <button id="scannerCapture" class="scanner-capture" type="button">Jetzt Farbe prüfen</button>
        <button id="scannerFileFallback" class="scanner-file-fallback" type="button">Bild auswählen</button>
        <button id="scannerCancel" class="scanner-cancel" type="button">Zur Farbkarte zurück</button>
      </div>
    </div>
  </section>
  <div id="colorFullscreen" class="color-fullscreen hidden" aria-hidden="true" aria-label="Vollbild-Farbansicht"></div>
  <script>
    window.ESKYNA_PALETTE_SLUG = "__PALETTE_SLUG__";
    window.ESKYNA_BASE_PATH = "__BASE_PATH__";
  </script>
  <script src="__BASE_PATH__i18n.js"></script>
  <script src="__BASE_PATH__palettes.js"></script>
  <script src="__BASE_PATH__palette-app.js"></script>
</body>
</html>
