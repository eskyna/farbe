<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f2e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ESKYNA Farben" />
  <link rel="manifest" href="/farbe/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/farbe/icons/apple-touch-icon.png" />
  <link rel="icon" href="/farbe/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/farbe/styles.css" />
  <title>ESKYNA Farbe</title>
</head>
<body>
  <div id="splashScreen" class="splash-screen" aria-hidden="true">
    <picture>
      <source media="(orientation: landscape)" srcset="/farbe/assets/splash-landscape.jpg" />
      <img src="/farbe/assets/splash-portrait.jpg" alt="" />
    </picture>
    <small class="splash-version">v__ESKYNA_APP_VERSION__</small>
  </div>

  <main class="app">
    <header class="hero" aria-label="ESKYNA Farben">
      <a class="hero-logo-link" href="https://eskyna.com" target="_blank" rel="noopener noreferrer" aria-label="ESKYNA Website öffnen">
        <img class="hero-logo" src="/farbe/assets/sign_gold.png" alt="ESKYNA Symbol" />
      </a>
      <div class="hero-copy">
        <h1 class="brand-title"><span class="brand-eskyna">ESKYNA</span> <span class="brand-farbe">Farbe</span></h1>
      </div>
    </header>
    <section id="overviewGrid" class="overview-grid" aria-label="Farbkarten Auswahl"></section>
  </main>
  <script src="/farbe/i18n.js"></script>
  <script src="/farbe/palettes.js"></script>
  <script src="/farbe/overview.js"></script>
</body>
</html>
