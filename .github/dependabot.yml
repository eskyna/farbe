version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      npm-dev-tools:
        dependency-type: development
    labels:
      - dependencies
      - npm

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:20'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:40'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

