name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, validate, build and BDD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install npm dependencies
        run: npm install

      - name: Install Python dev tools
        run: python -m pip install -r requirements-dev.txt

      - name: Run full project check
        run: npm run check

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: eskyna-farbe-dist
          path: dist
          if-no-files-found: error

