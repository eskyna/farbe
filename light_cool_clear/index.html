<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f2e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ESKYNA - light cool clear" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/farbe/icons/light_cool_clear-apple-touch-icon.png" />
  <link rel="icon" href="/farbe/icons/light_cool_clear-192.png" />
  <link rel="stylesheet" href="/farbe/styles.css" />
  <title>ESKYNA - light cool clear</title>
</head>
<body>
  <main class="app">
    <header class="hero" aria-label="ESKYNA - light cool clear">
      <img class="hero-logo" src="/farbe/assets/sign_gold.png" alt="ESKYNA Symbol" />
      <div class="hero-copy">
        <p class="eyebrow">ESKYNA</p>
        <h1 id="pageTitle">light cool clear</h1>
      </div>
    </header>

    <section class="panel palette-panel" aria-label="Farbkarte light cool clear">
      <div class="panel-head">
        <div>
          <p class="section-kicker">Meine Palette</p>
          <h2 id="paletteName">light cool clear</h2>
        </div>
      </div>
      <div id="paletteGrid" class="palette-grid"></div>
    </section>

    <section class="panel check-panel" aria-label="Kleidungsstück prüfen">
      <div class="panel-head simple">
        <div>
          <p class="section-kicker">Profi-Feature</p>
          <h2>Farbe prüfen</h2>
        </div>
      </div>
      <p class="hint">Foto machen oder wählen. Das Kleidungsstück muss in der Bildmitte liegen.</p>
      <label class="file-button">
        Foto wählen
        <input id="photoInput" type="file" accept="image/*" capture="environment" />
      </label>
      <div id="previewWrap" class="preview-wrap hidden">
        <canvas id="previewCanvas"></canvas>
        <div class="target" aria-hidden="true"></div>
      </div>
      <div id="result" class="result hidden" aria-live="polite"></div>
    </section>
  </main>
  <script>
    window.ESKYNA_PALETTE_SLUG = "light_cool_clear";
    window.ESKYNA_BASE_PATH = "/farbe/";
  </script>
  <script src="/farbe/palettes.js"></script>
  <script src="/farbe/palette-app.js"></script>
</body>
</html>
